version: "3.9"

services:
  mongo:
    image: mongo:7
    container_name: relluna-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: relluna

  api:
    build: .
    command: ["uvicorn", "relluna.services.ingestion.api:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      # usados por MongoSettings.from_env()
      - MONGO_URI=mongodb://mongo:27017
      - MONGO_DB=relluna
    volumes:
      - .:/app
    depends_on:
      - mongo
      - redis
      - minio

  worker:
    build: .
    command: ["python", "-m", "relluna.services.persistence.dm_writer"]
    environment:
      - PYTHONUNBUFFERED=1
      - MONGO_URI=mongodb://mongo:27017
      - MONGO_DB=relluna
      - RELLUNA_WORKER_POLL_INTERVAL_S=5
    volumes:
      - .:/app
    depends_on:
      - mongo
      - redis

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

volumes:
  minio_data:
