name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests + Benchmark Gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr poppler-utils ffmpeg

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"
          pip install -r requirements-dev.txt

      - name: Lint
        run: make lint

      - name: Run tests
        env:
          APP_ENV: test
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY_TEST }}
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT_TEST }}
          MONGO_URI: ${{ secrets.MONGO_URI_TEST }}
        run: make test

      - name: Run benchmark gate
        env:
          APP_ENV: test
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY_TEST }}
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT_TEST }}
          MONGO_URI: ${{ secrets.MONGO_URI_TEST }}
        run: make benchmark-gate

  security:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
